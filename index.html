<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav id="top-nav">
    <button id="menu-btn">☰</button>
    <input type="text" id="player-name" placeholder="Your Name">
</nav>

<div id="screen-home" class="screen active">
    <h1>Cross Bingo</h1>
    <button id="btn-create">Create Room</button>

    <input id="room-code-input" placeholder="Room Code">
    <button id="btn-join">Join Room</button>
    <p id="error"></p>
</div>

<div id="screen-wait" class="screen">
    <h2>Room: <span id="room-code"></span></h2>
    <p>Waiting for player...</p>
</div>

<div id="screen-game" class="screen">
    <div id="status"></div>
    <div id="timer"></div>
    <div id="bingo"></div>

    <div id="grid"></div>
    <button id="undo">Undo</button>
</div>

<div id="screen-end" class="screen">
    <h1 id="result"></h1>
    <button onclick="location.reload()">Play Again</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
